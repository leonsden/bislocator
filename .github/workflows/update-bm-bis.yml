name: Update BM Hunter BiS

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Scrape BiS
        run: npm run scrape:bm

      - name: Enrich item sources
        run: npm run enrich:bm

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update BM Hunter BiS data"
          git push
